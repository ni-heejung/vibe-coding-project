name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run Prettier check
        run: npx prettier --check "src/**/*.{ts,tsx,js,jsx}"

      - name: Run TypeScript type check
        run: npm run typecheck

  validate-openapi:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI Spec
        run: npm run spec:lint

      - name: Validate OpenAPI Spec
        run: npm run spec:validate

  generate-code:
    name: Generate Code from Spec
    needs: validate-openapi
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Generate all code
        run: npm run generate:all

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: generated/
          retention-days: 1

  e2e-tests:
    name: E2E Tests
    needs: [lint-and-typecheck, generate-code]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: realworld_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: generated/

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Setup database
        run: npx prisma migrate deploy
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test

      - name: Seed database
        run: npm run seed
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test

      - name: Build application
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-screenshots
          path: e2e/screenshots/
          retention-days: 7

  contract-tests:
    name: Contract Tests
    needs: [lint-and-typecheck, generate-code]
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: realworld_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: generated/

      - name: Setup database
        run: npx prisma migrate deploy
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test

      - name: Run contract tests
        run: npm run test:contract
        env:
          POSTGRES_PRISMA_URL: postgresql://postgres:password@localhost:5432/realworld_test
          POSTGRES_URL_NON_POOLING: postgresql://postgres:password@localhost:5432/realworld_test
          NEXTAUTH_SECRET: test-secret-for-ci
          NEXTAUTH_URL: http://localhost:3000

  build:
    name: Build Application
    needs: [e2e-tests, contract-tests]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm install

      - name: Download generated code
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: generated/

      - name: Build application
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
