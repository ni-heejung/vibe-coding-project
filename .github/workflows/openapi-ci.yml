name: OpenAPI CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'specs/**'
      - 'scripts/**'
      - '.github/workflows/openapi-ci.yml'
  pull_request:
    branches: [main, develop]

jobs:
  validate-spec:
    name: Validate OpenAPI Spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI Spec
        run: npm run spec:lint

      - name: Validate OpenAPI Spec
        run: npm run spec:validate

  generate-code:
    name: Generate Code from Spec
    needs: validate-spec
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Generate all code
        run: npm run generate:all

      - name: Upload generated code
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: generated/
          retention-days: 1

  deploy-docs:
    name: Deploy API Documentation
    needs: validate-spec
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build documentation
        run: npx @redocly/cli build-docs specs/openapi.yaml --output docs/api.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: api-docs
