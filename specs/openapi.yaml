openapi: 3.0.3
info:
  title: RealWorld API
  description: |
    Next.js 14 풀스택 애플리케이션 - RealWorld 명세 구현

    **인증:** JWT 기반 NextAuth.js 사용

    **주요 기능:**
    - 사용자 인증 및 프로필 관리
    - 게시글 CRUD 및 즐겨찾기
    - 댓글 작성 및 삭제
    - 사용자 팔로우/언팔로우
    - 태그 기반 게시글 필터링

  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:3000
    description: 로컬 개발 서버
  - url: https://your-production-url.com
    description: 프로덕션 서버

tags:
  - name: Authentication
    description: 사용자 인증 관련 API
  - name: User
    description: 사용자 정보 관리
  - name: Profile
    description: 사용자 프로필 및 팔로우
  - name: Articles
    description: 게시글 CRUD
  - name: Comments
    description: 게시글 댓글
  - name: Favorites
    description: 게시글 즐겨찾기

paths:
  /api/users:
    post:
      tags:
        - Authentication
      summary: 사용자 회원가입
      description: 새로운 사용자 계정을 생성합니다
      operationId: registerUser
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserRegistration'
      responses:
        '200':
          description: 회원가입 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/user:
    put:
      tags:
        - User
      summary: 사용자 정보 수정
      description: 현재 로그인한 사용자의 정보를 업데이트합니다
      operationId: updateUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user
              properties:
                user:
                  $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: 업데이트 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/profiles/{username}/follow:
    post:
      tags:
        - Profile
      summary: 사용자 팔로우
      description: 특정 사용자를 팔로우합니다
      operationId: followUser
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: 팔로우할 사용자의 username
      responses:
        '200':
          description: 팔로우 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Profile
      summary: 사용자 언팔로우
      description: 특정 사용자를 언팔로우합니다
      operationId: unfollowUser
      security:
        - bearerAuth: []
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
          description: 언팔로우할 사용자의 username
      responses:
        '200':
          description: 언팔로우 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  profile:
                    $ref: '#/components/schemas/Profile'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/articles:
    post:
      tags:
        - Articles
      summary: 게시글 작성
      description: 새로운 게시글을 작성합니다
      operationId: createArticle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - article
              properties:
                article:
                  $ref: '#/components/schemas/ArticleInput'
      responses:
        '200':
          description: 게시글 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  article:
                    $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/articles/{slug}:
    put:
      tags:
        - Articles
      summary: 게시글 수정
      description: 기존 게시글을 수정합니다
      operationId: updateArticle
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 게시글 slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - article
              properties:
                article:
                  $ref: '#/components/schemas/ArticleUpdate'
      responses:
        '200':
          description: 게시글 수정 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  article:
                    $ref: '#/components/schemas/Article'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Articles
      summary: 게시글 삭제
      description: 게시글을 삭제합니다
      operationId: deleteArticle
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 삭제할 게시글의 slug
      responses:
        '204':
          description: 삭제 성공
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/articles/{slug}/favorite:
    post:
      tags:
        - Favorites
      summary: 게시글 즐겨찾기 추가
      description: 게시글을 즐겨찾기에 추가합니다
      operationId: favoriteArticle
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 즐겨찾기할 게시글의 slug
      responses:
        '200':
          description: 즐겨찾기 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - Favorites
      summary: 게시글 즐겨찾기 제거
      description: 게시글을 즐겨찾기에서 제거합니다
      operationId: unfavoriteArticle
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 즐겨찾기 해제할 게시글의 slug
      responses:
        '200':
          description: 즐겨찾기 제거 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Article'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/articles/{slug}/comments:
    get:
      tags:
        - Comments
      summary: 댓글 목록 조회
      description: 특정 게시글의 댓글 목록을 가져옵니다
      operationId: getComments
      security: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 게시글 slug
      responses:
        '200':
          description: 댓글 목록 조회 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items:
                      $ref: '#/components/schemas/Comment'

    post:
      tags:
        - Comments
      summary: 댓글 작성
      description: 게시글에 댓글을 작성합니다
      operationId: createComment
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 게시글 slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - comment
              properties:
                comment:
                  type: string
                  minLength: 1
                  maxLength: 65535
                  description: 댓글 내용
      responses:
        '200':
          description: 댓글 작성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  comment:
                    $ref: '#/components/schemas/Comment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/articles/{slug}/comments/{commentId}:
    delete:
      tags:
        - Comments
      summary: 댓글 삭제
      description: 댓글을 삭제합니다 (소프트 삭제)
      operationId: deleteComment
      security:
        - bearerAuth: []
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
          description: 게시글 slug
        - name: commentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: 삭제할 댓글 ID
      responses:
        '204':
          description: 댓글 삭제 성공
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: NextAuth.js JWT 토큰

  schemas:
    UserRegistration:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          maxLength: 20
          description: 사용자 이름
          example: johndoe
        email:
          type: string
          format: email
          description: 이메일 주소
          example: john@example.com
        password:
          type: string
          minLength: 6
          description: 비밀번호 (최소 6자)
          example: password123

    UserUpdate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 사용자 ID
        username:
          type: string
          maxLength: 20
          description: 사용자 이름
        email:
          type: string
          format: email
          description: 이메일 주소
        password:
          type: string
          minLength: 6
          description: 새 비밀번호
        bio:
          type: string
          description: 사용자 소개
        image:
          type: string
          format: uri
          description: 프로필 이미지 URL

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 사용자 고유 ID
        username:
          type: string
          description: 사용자 이름
        email:
          type: string
          format: email
          description: 이메일 주소
        bio:
          type: string
          nullable: true
          description: 사용자 소개
        image:
          type: string
          description: 프로필 이미지 URL
        following:
          type: boolean
          description: 현재 사용자가 이 사용자를 팔로우하는지 여부

    Profile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        bio:
          type: string
          nullable: true
        image:
          type: string
        following:
          type: boolean
          description: 팔로우 여부

    ArticleInput:
      type: object
      required:
        - title
        - body
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 100
          description: 게시글 제목
          example: How to train your dragon
        description:
          type: string
          description: 게시글 요약
          example: Ever wonder how?
        body:
          type: string
          minLength: 1
          maxLength: 65535
          description: 게시글 본문
          example: It takes a Jacobian
        tagList:
          type: array
          items:
            type: string
            maxLength: 100
          description: 태그 목록
          example: ["dragons", "training"]

    ArticleUpdate:
      allOf:
        - $ref: '#/components/schemas/ArticleInput'
        - type: object
          required:
            - slug
          properties:
            slug:
              type: string
              description: 게시글 slug

    Article:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 게시글 ID
        slug:
          type: string
          description: URL에 사용되는 고유 slug
        title:
          type: string
          description: 게시글 제목
        description:
          type: string
          description: 게시글 요약
        body:
          type: string
          description: 게시글 본문
        tagList:
          type: array
          items:
            type: string
          description: 태그 목록
        createdAt:
          type: string
          format: date-time
          description: 생성 시간
        updatedAt:
          type: string
          format: date-time
          description: 수정 시간
        favorited:
          type: boolean
          description: 현재 사용자가 즐겨찾기했는지 여부
        favoritesCount:
          type: integer
          description: 즐겨찾기 수
        author:
          $ref: '#/components/schemas/Profile'

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: 댓글 ID
        body:
          type: string
          description: 댓글 내용
        createdAt:
          type: string
          format: date-time
          description: 작성 시간
        updatedAt:
          type: string
          format: date-time
          description: 수정 시간
        author:
          $ref: '#/components/schemas/Profile'

    Error:
      type: object
      properties:
        errors:
          type: object
          description: 에러 상세 정보
          additionalProperties:
            type: array
            items:
              type: string

  responses:
    BadRequest:
      description: 잘못된 요청 (검증 실패)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            errors:
              email: ["Invalid email"]
              password: ["Password is too short"]

    Unauthorized:
      description: 인증 필요
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            errors:
              message: ["Unauthorized"]

    Forbidden:
      description: 권한 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            errors:
              message: ["Forbidden"]

    NotFound:
      description: 리소스를 찾을 수 없음
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            errors:
              message: ["Resource not found"]
